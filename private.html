<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Access – Lira Nox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  background: #0a0a0a;
  color: #f2f2f2;
  font-family: Georgia, serif;
}

/* =========================
   NAV
========================= */
.nav {
  position: absolute;
  top: 0;
  right: 0;
  padding: 32px 120px 0;
  display: flex;
  gap: 36px;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  z-index: 10;
}

.nav a {
  color: #f2f2f2;
  text-decoration: none;
}

.nav a:hover {
  opacity: 0.6;
}

/* =========================
   HERO
========================= */
.private-hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  text-align: center;
}

.private-hero img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(100%) contrast(105%) blur(0.4px);
  opacity: 0.75;
}

/* =========================
   CONTENT
========================= */
.overlay {
  position: relative;
  z-index: 2;
  max-width: 600px;
}

/* HEADLINE (IDENTISCH!) */
.overlay h1 {
  font-size: 1.8rem;
  letter-spacing: 0.5em;
  font-weight: 400;
  margin-bottom: 26px;
}

/* TEXT */
.overlay p {
  font-size: 0.95rem;
  line-height: 1.8;
  opacity: 0.85;
}

/* DIVIDER */
.divider {
  width: 70px;
  height: 1px;
  background: rgba(255,255,255,0.3);
  margin: 45px auto;
}

/* CTA (FEIN VERSTÄRKT) */
.cta {
  display: inline-block;
  font-size: 1.05rem;
  letter-spacing: 0.38em;
  text-decoration: none;
  color: #ff3b2f;
  transition: all 0.3s ease;
}

.cta:hover {
  opacity: 0.7;
  letter-spacing: 0.42em;
}

/* LOCKED TEXT (FIXED POSITION + KONTRAST) */
.locked {
  margin-top: 22px;
  font-size: 0.72rem;
  letter-spacing: 0.4em;
  color: rgba(0,0,0,0.65);
}

/* 🔥 NEU: TELEGRAM LINK (GLEICHER STIL) */
.telegram {
  margin-top: 28px;
  font-size: 0.7rem;
  letter-spacing: 0.35em;
  opacity: 0.45;
}

.telegram a {
  color: #f2f2f2;
  text-decoration: none;
}

.telegram a:hover {
  opacity: 0.7;
}

/* =========================
   MOBILE
========================= */
@media (max-width: 900px) {

  .nav {
    padding: 20px 28px 0;
  }

  .overlay h1 {
    font-size: 1.5rem;
  }

  .overlay p {
    font-size: 0.85rem;
  }
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">HOME</a>
  <a href="editorial.html">EDITORIAL</a>
</div>

<!-- HERO -->
<section class="private-hero">

  <img src="images/private.jpg" alt="Private Lira">

  <div class="overlay">

    <h1>PRIVATE ACCESS</h1>

    <p>
      Not everything is meant to be seen.<br>
      Most of it isn’t public.
    </p>

    <div class="divider"></div>

    <a href="https://fanvue.com/nox.lira" target="_blank" class="cta">
      ENTER FANVUE
    </a>

    <div class="locked">
      restricted access
    </div>

    <!-- 🔥 NEU: PRIVATE CHAT -->
    <div class="telegram">
      <a href="https://t.me/liranox" target="_blank">
        private conversation
      </a>
    </div>

  </div>

</section>

</body>
</html>
