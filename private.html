<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Access – Lira Nox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  background: #0a0a0a;
  color: #f2f2f2;
  font-family: Georgia, serif;
}

/* =========================
   NAV
========================= */
.nav {
  position: absolute;
  top: 0;
  right: 0;
  padding: 32px 120px 0;
  display: flex;
  gap: 36px;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  z-index: 10;
}

.nav a {
  color: #f2f2f2;
  text-decoration: none;
}

.nav a:hover {
  opacity: 0.6;
}

/* =========================
   PRIVATE CHAT BUTTON (PERFECT ALIGNMENT)
========================= */
.private-chat {
  position: absolute;
  bottom: 70px;
  right: 120px; /* exakt gleiche Linie wie NAV */
  z-index: 11;
}

.private-chat a {
  text-decoration: none;
  font-size: 0.68rem;
  letter-spacing: 0.35em;
  padding: 10px 18px;
  color: #ffffff;
  background: rgba(0,0,0,0.75);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(6px);
  transition: all 0.35s ease;
}

/* Premium Hover */
.private-chat a:hover {
  background: #111;
  border-color: rgba(255,255,255,0.3);
  letter-spacing: 0.4em;
}

/* =========================
   HERO
========================= */
.private-hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  text-align: center;
}

.private-hero img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(100%) contrast(105%) blur(0.4px);
  opacity: 0.75;
}

/* =========================
   CONTENT
========================= */
.overlay {
  position: relative;
  z-index: 2;
  max-width: 600px;
}

.overlay h1 {
  font-size: 1.8rem;
  letter-spacing: 0.5em;
  font-weight: 400;
  margin-bottom: 26px;
}

.overlay p {
  font-size: 0.95rem;
  line-height: 1.8;
  opacity: 0.85;
}

.divider {
  width: 70px;
  height: 1px;
  background: rgba(255,255,255,0.3);
  margin: 45px auto;
}

.cta {
  display: inline-block;
  font-size: 1.05rem;
  letter-spacing: 0.38em;
  text-decoration: none;
  color: #ff3b2f;
  transition: all 0.3s ease;
}

.cta:hover {
  opacity: 0.7;
  letter-spacing: 0.42em;
}

/* =========================
   MOBILE
========================= */
@media (max-width: 900px) {

  .nav {
    padding: 20px 28px 0;
  }

  .overlay h1 {
    font-size: 1.5rem;
  }

  .overlay p {
    font-size: 0.85rem;
  }

  .private-chat {
    bottom: 30px;
    right: 28px; /* angepasst für mobile */
  }

}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">HOME</a>
  <a href="editorial.html">EDITORIAL</a>
</div>

<!-- PRIVATE CHAT BUTTON -->
<div class="private-chat">
  <a href="https://t.me/Lira_Nox_Official" target="_blank">
    PRIVATE CHAT REQUEST
  </a>
</div>

<!-- HERO -->
<section class="private-hero">

  <img src="images/private.jpg" alt="Private Lira">

  <div class="overlay">

    <h1>PRIVATE ACCESS</h1>

    <p>
      Not everything is meant to be seen.<br>
      Most of it isn’t public.
    </p>

    <div class="divider"></div>

    <a href="https://fanvue.com/nox.lira" target="_blank" class="cta">
      ENTER FANVUE
    </a>

  </div>

</section>

</body>
