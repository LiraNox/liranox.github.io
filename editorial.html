<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editorial – Lira Nox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  background: #0a0a0a;
  color: #f2f2f2;
  font-family: Georgia, serif;
}

/* =========================
   NAV (FIXED)
========================= */
.nav {
  position: absolute;
  top: 0;
  right: 0;
  padding: 32px 120px 0;
  display: flex;
  gap: 36px;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  z-index: 10;
}

.nav a {
  color: #f2f2f2;
  text-decoration: none;
}

.nav a:hover {
  opacity: 0.6;
}

/* =========================
   HEADER
========================= */
.editorial-header {
  text-align: center;
  padding: 140px 20px 60px;
}

.editorial-header h1 {
  font-size: 1.8rem;
  letter-spacing: 0.5em;
  font-weight: 400;
  margin-bottom: 20px;
}

.editorial-header p {
  font-size: 0.95rem;
  letter-spacing: 0.25em;
  opacity: 0.5;
}

/* =========================
   GRID
========================= */
.grid {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 0 20px 100px;
}

.grid img {
  width: 100%;
  height: 520px;
  object-fit: cover;
  display: block;
  filter: grayscale(100%) contrast(105%);
  transition: all 0.4s ease;
}

.grid img:hover {
  filter: grayscale(0%);
}

/* =========================
   COLLAB (WIEDER DRIN)
========================= */
.collab {
  padding: 60px 20px 120px;
  text-align: center;
}

.collab-lines {
  width: 140px;
  height: 1px;
  background: rgba(255,255,255,0.12);
  margin: 0 auto 44px;
  position: relative;
}

.collab-lines::after {
  content: "";
  width: 70px;
  height: 1px;
  background: rgba(255,255,255,0.25);
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
}

.collab-text {
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  opacity: 0.35;
  margin-bottom: 22px;
}

.collab-mail {
  text-decoration: none;
  color: #f2f2f2;
  font-size: 1rem;
  letter-spacing: 0.28em;
  transition: all 0.3s ease;
}

.collab-mail:hover {
  opacity: 0.6;
  transform: translateY(-2px);
}

/* =========================
   MOBILE
========================= */
@media (max-width: 900px) {

  .nav {
    padding: 20px 28px 0;
  }

  .editorial-header {
    padding: 120px 20px 40px;
  }

  .editorial-header h1 {
    font-size: 1.5rem;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .grid img {
    height: auto;
  }
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">HOME</a>
  <a href="private.html">PRIVATE</a>
</div>

<!-- HEADER -->
<section class="editorial-header">
  <h1>EDITORIAL</h1>
  <p>VISUAL IDENTITY · CURATED PRESENCE</p>
</section>

<!-- GRID -->
<section class="grid">
  <img src="images/editorial-1.jpeg">
  <img src="images/editorial-2.jpeg">
  <img src="images/editorial-3.jpeg">
  <img src="images/editorial-4.jpeg">
  <img src="images/editorial-5.jpeg">
  <img src="images/editorial-6.jpeg">
</section>

<!-- COLLAB -->
<section class="collab">

  <div class="collab-lines"></div>

  <p class="collab-text">
    FOR CURATED COLLABORATIONS
  </p>

  <a href="mailto:lira.nox@outlook.com" class="collab-mail">
    lira.nox@outlook.com
  </a>

</section>

</body>
</html>
