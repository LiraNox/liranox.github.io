<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lira Nox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C51WPZLR62"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-C51WPZLR62');
</script>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: #f2f2f2;
  font-family: Georgia, serif;
}

.site-header {
  position: absolute;
  top: 0;
  width: 100%;
  z-index: 10;
}

.nav {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 120px 0;
  display: flex;
  justify-content: flex-end;
  gap: 36px;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
}

.nav a {
  color: #f2f2f2;
  text-decoration: none;
}

.hero {
  min-height: 86vh;
  padding: 80px 120px 10px;
  display: flex;
  align-items: center;
}

.hero-inner {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1.25fr;
  gap: 90px;
  align-items: center;
}

.hero-text h1 {
  font-size: 2.5rem;
  letter-spacing: 0.48em;
  font-weight: 400;
}

.hero-image img {
  width: 100%;
  max-width: 88%;
  filter: grayscale(100%);
}

.action {
  padding: 40px 120px 100px;
}

.action-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 60px;
}

.action-item {
  text-decoration: none;
  color: #f2f2f2;
  border-top: 1px solid rgba(255,255,255,0.12);
  padding-top: 20px;
}

.action-item strong {
  letter-spacing: 0.25em;
}

.action-item.highlight strong {
  color: #c0392b;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,10,10,0.96);
  display: none;
  padding: 28px 24px;
  z-index: 999;
  border: 1px solid rgba(255,255,255,0.15);
}

.popup-content {
  text-align: center;
  max-width: 320px;
}

.popup-content p {
  font-size: 0.85rem;
  letter-spacing: 0.18em;
}

.popup-btn {
  display: inline-block;
  margin-top: 15px;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 10px 20px;
  text-decoration: none;
  color: white;
}

/* MOBILE FIX */
@media (max-width: 900px) {

  .nav {
    padding: 20px;
  }

  .hero {
    padding: 60px 20px;
  }

  .hero-inner {
    grid-template-columns: 1fr;
    gap: 40px;
  }

  .hero-text {
    text-align: center;
  }

  .hero-image img {
    max-width: 90%;
    margin: 0 auto;
  }

  .action {
    padding: 40px 20px;
  }

  .action-inner {
    grid-template-columns: 1fr;
  }

  .popup {
    bottom: 20px;
    width: 85%;
    padding: 18px;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <nav class="nav">
    <a href="editorial.html">EDITORIAL</a>
    <a href="private.html">PRIVATE</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-text">
      <h1>LIRA NOX</h1>
      <p>A digital fashion model crafted for visual impact.</p>
    </div>

    <div class="hero-image">
      <img src="images/hero.jpg">
    </div>
  </div>
</section>

<section class="action">
  <div class="action-inner">

    <a href="https://instagram.com/nox.lira" target="_blank" class="action-item">
      <strong>Instagram</strong>
    </a>

    <a href="https://fanvue.com/nox.lira" target="_blank" class="action-item highlight">
      <strong>Fanvue</strong>
    </a>

  </div>
</section>

<!-- POPUP -->
<div id="telegramPopup" class="popup">
  <div class="popup-content">

    <p>
      There’s more.<br>
      Just not here.
    </p>

    <a href="https://fanvue.com/nox.lira" target="_blank" class="popup-btn">
      ENTER PRIVATE
    </a>

  </div>
</div>

<script>
setTimeout(function() {
  document.getElementById("telegramPopup").style.display = "flex";
}, 3000);
</script>

</body>
</html>
