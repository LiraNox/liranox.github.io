<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lira Nox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C51WPZLR62"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-C51WPZLR62');
</script>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: #f2f2f2;
  font-family: Georgia, serif;
}

/* NAV */
.nav {
  position: absolute;
  top: 0;
  right: 0;
  padding: 32px 120px 0;
  display: flex;
  gap: 36px;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
}

.nav a {
  color: #f2f2f2;
  text-decoration: none;
}

/* HERO */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 80px 120px;
}

.hero-inner {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 80px;
  width: 100%;
}

.hero-text h1 {
  font-size: 2.5rem;
  letter-spacing: 0.5em;
}

.hero-image img {
  width: 100%;
  max-width: 90%;
  filter: grayscale(100%);
}

/* ACTION */
.action {
  padding: 60px 120px;
}

.action-inner {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 60px;
}

.action-item {
  color: white;
  text-decoration: none;
}

/* POPUP (FIXED) */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(10,10,10,0.98);
  padding: 30px;
  display: none;
  z-index: 999;
  border: 1px solid rgba(255,255,255,0.15);
  max-width: 320px;
  width: 90%;
}

.popup-content {
  position: relative;
  text-align: center;
}

.popup-close {
  position: absolute;
  top: -10px;
  right: -10px;
  font-size: 20px;
  cursor: pointer;
}

.popup-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 18px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
}

/* MOBILE */
@media (max-width: 900px) {
  .hero-inner {
    grid-template-columns: 1fr;
  }

  .hero-image {
    text-align: center;
  }
}
</style>
</head>

<body>

<div class="nav">
  <a href="editorial.html">EDITORIAL</a>
  <a href="private.html">PRIVATE</a>
</div>

<section class="hero">
  <div class="hero-inner">

    <div class="hero-text">
      <h1>LIRA NOX</h1>
    </div>

    <div class="hero-image">
      <!-- FIX: RELATIVE PATH -->
      <img src="images/hero.jpg" alt="Lira Nox">
    </div>

  </div>
</section>

<section class="action">
  <div class="action-inner">

    <a href="https://instagram.com/nox.lira" target="_blank" class="action-item">Instagram</a>

    <a href="https://t.me/nox_lira" target="_blank" class="action-item">Telegram</a>

    <a href="https://fanvue.com/nox.lira" target="_blank" class="action-item"
    onclick="gtag('event','fanvue_click',{event_label:'fanvue_main'});">
      Fanvue
    </a>

  </div>
</section>

<!-- POPUP -->
<div id="telegramPopup" class="popup">
  <div class="popup-content">
    <span class="popup-close" onclick="closePopup()">×</span>

    <p>
      There’s more.<br>
      Just not here.
    </p>

    <a href="https://t.me/nox_lira" target="_blank" class="popup-btn">
      ENTER PRIVATE CHANNEL
    </a>
  </div>
</div>

<script>
function isMobile(){
  return /Mobi|Android/i.test(navigator.userAgent);
}

function closePopup(){
  document.getElementById("telegramPopup").style.display = "none";
}

setTimeout(function(){
  document.getElementById("telegramPopup").style.display = "block";
}, isMobile()?2000:5000);
</script>

</body>
</html>
