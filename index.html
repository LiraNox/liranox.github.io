<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lira Nox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C51WPZLR62"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-C51WPZLR62');
</script>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: #f2f2f2;
  font-family: Georgia, serif;
}

/* NAV */
.site-header {
  position: absolute;
  top: 0;
  width: 100%;
  z-index: 10;
}

.nav {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 120px 0;
  display: flex;
  justify-content: flex-end;
  gap: 36px;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
}

/* HERO */
.hero {
  min-height: 86vh;
  padding: 80px 120px 10px;
  display: flex;
  align-items: center;
}

.hero-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1.25fr;
  gap: 90px;
  align-items: center;
}

.hero-image img {
  width: 100%;
  max-width: 88%;
  filter: grayscale(100%);
}

/* ACTION */
.action {
  padding: 40px 120px 100px;
}

.action-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 70px;
}

.action-item {
  text-decoration: none;
  color: #f2f2f2;
  border-top: 1px solid rgba(255,255,255,0.12);
  padding-top: 22px;
}

.action-item.highlight strong {
  color: #c0392b;
}

/* =========================
   QR POPUP (DESKTOP)
========================= */
.qr-popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.qr-box {
  position: relative;
  text-align: center;
  padding: 40px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.85);
}

.qr-box p {
  font-size: 0.8rem;
  letter-spacing: 0.25em;
  margin-bottom: 25px;
}

.qr-box img {
  width: 180px;
  margin-bottom: 20px;
}

.qr-close {
  position: absolute;
  top: 12px;
  right: 16px;
  cursor: pointer;
  font-size: 0.9rem;
  opacity: 0.6;
}

.qr-close:hover {
  opacity: 1;
}

/* MOBILE */
@media (max-width: 900px) {
  .hero {
    padding: 80px 28px 20px;
  }

  .hero-inner {
    grid-template-columns: 1fr;
  }

  .action {
    padding: 50px 28px 80px;
  }

  .action-inner {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <nav class="nav">
    <a href="editorial.html">EDITORIAL</a>
    <a href="private.html">PRIVATE</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-inner">

    <div>
      <h1>LIRA NOX</h1>
      <p>A digital fashion model<br>crafted for visual impact.</p>
    </div>

    <div class="hero-image">
      <img src="https://liranox.com/images/hero.jpg">
    </div>

  </div>
</section>

<section class="action">
  <div class="action-inner">

    <a href="https://instagram.com/nox.lira" target="_blank" class="action-item">
      <strong>Instagram</strong>
    </a>

    <!-- TELEGRAM SMART LINK -->
    <a href="#" onclick="handleTelegramClick()" class="action-item">
      <strong>Telegram</strong>
    </a>

    <a href="https://fanvue.com/nox.lira" target="_blank" class="action-item highlight"
    onclick="gtag('event','fanvue_click',{event_label:'fanvue_main'});">
      <strong>Fanvue</strong>
    </a>

  </div>
</section>

<!-- QR POPUP -->
<div id="qrPopup" class="qr-popup">
  <div class="qr-box">

    <div class="qr-close" onclick="closeQR()">✕</div>

    <p>
      Open on your phone<br>
      to access private content
    </p>

    <!-- QR CODE -->
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://t.me/nox_lira">

    <p style="font-size:0.6rem;opacity:0.5;">
      t.me/nox_lira
    </p>

  </div>
</div>

<script>
function isMobile() {
  return /Mobi|Android/i.test(navigator.userAgent);
}

function handleTelegramClick() {

  if (isMobile()) {
    window.open("https://t.me/nox_lira", "_blank");

    gtag('event', 'telegram_click', {
      event_label: 'mobile_direct'
    });

  } else {
    document.getElementById("qrPopup").style.display = "flex";

    gtag('event', 'telegram_click', {
      event_label: 'desktop_qr'
    });
  }
}

function closeQR() {
  document.getElementById("qrPopup").style.display = "none";
}
</script>

</body>
</html>
