<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lira Nox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =========================
   RESET
========================= */
body {
  margin: 0;
  background: #0a0a0a;
  color: #f2f2f2;
  font-family: Georgia, serif;
  -webkit-font-smoothing: antialiased;
}

/* =========================
   HEADER
========================= */
.site-header {
  position: absolute;
  top: 0;
  width: 100%;
  z-index: 10;
}

.nav {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 120px 0;
  display: flex;
  justify-content: flex-end;
  gap: 36px;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  opacity: 0.85;
}

.nav a {
  color: #f2f2f2;
  text-decoration: none;
}

.nav a:hover {
  opacity: 0.6;
}

/* =========================
   HERO
========================= */
.hero {
  min-height: 86vh;
  padding: 80px 120px 10px;
  display: flex;
  align-items: center;
}

.hero-inner {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1.25fr;
  gap: 90px;
  align-items: center;
}

.hero-text h1 {
  font-size: 2.5rem;
  letter-spacing: 0.48em;
  font-weight: 400;
  margin-bottom: 44px;
}

.hero-text .lead {
  font-size: 0.95rem;
  line-height: 1.8;
  margin-bottom: 30px;
  opacity: 0.85;
}

.hero-text .values {
  font-size: 0.9rem;
  line-height: 1.9;
  opacity: 0.55;
}

/* =========================
   HERO IMAGE
========================= */
.hero-image {
  display: flex;
  justify-content: flex-end;
}

.hero-image img {
  width: 100%;
  max-width: 88%;
  height: auto;
  display: block;
  filter: grayscale(100%) contrast(105%);
}

/* =========================
   ACTION
========================= */
.action {
  padding: 40px 120px 100px;
}

.action-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 70px;
}

.action-item {
  text-decoration: none;
  color: #f2f2f2;
  display: block;
  border-top: 1px solid rgba(255,255,255,0.12);
  padding-top: 22px;
  transition: all 0.3s ease;
}

.action-item span {
  display: block;
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  opacity: 0.45;
  margin-bottom: 12px;
}

.action-item strong {
  font-size: 1.05rem;
  letter-spacing: 0.22em;
  font-weight: 400;
}

.action-item:hover {
  opacity: 0.55;
}

/* Fanvue subtil stärker */
.action-item.highlight strong {
  color: #c0392b;
}

/* =========================
   COLLAB (PERFECT POSITIONED)
========================= */
.collab {
  padding: 60px 120px 120px;
  margin-top: -70px; /* zieht ihn nach oben */
}

.collab-inner {
  max-width: 1400px;
  margin: 0 auto;
  text-align: center;
}

/* elegante Linien */
.collab-lines {
  width: 140px;
  height: 1px;
  background: rgba(255,255,255,0.12);
  margin: 0 auto 44px;
  position: relative;
}

.collab-lines::after {
  content: "";
  width: 70px;
  height: 1px;
  background: rgba(255,255,255,0.25);
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
}

.collab-text {
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  opacity: 0.35;
  margin-bottom: 22px;
}

/* Signature Mail */
.collab-mail {
  text-decoration: none;
  color: #f2f2f2;
  font-size: 1rem;
  letter-spacing: 0.28em;
  transition: all 0.3s ease;
}

.collab-mail:hover {
  opacity: 0.6;
  transform: translateY(-2px);
}

/* =========================
   MOBILE
========================= */
@media (max-width: 900px) {

  .nav {
    padding: 20px 28px 0;
  }

  .hero {
    padding: 80px 28px 20px;
    min-height: unset;
  }

  .hero-inner {
    grid-template-columns: 1fr;
    gap: 50px;
  }

  .hero-text {
    text-align: center;
  }

  .hero-text h1 {
    font-size: 2rem;
    letter-spacing: 0.4em;
  }

  .hero-image {
    justify-content: center;
  }

  .hero-image img {
    max-width: 85%;
  }

  .action {
    padding: 50px 28px 80px;
  }

  .action-inner {
    grid-template-columns: 1fr;
    gap: 40px;
  }

  .collab {
    padding: 80px 28px 100px;
    margin-top: -40px;
  }
}
</style>
</head>

<body>

<header class="site-header">
  <nav class="nav">
    <a href="editorial.html">EDITORIAL</a>
    <a href="private.html">PRIVATE</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-inner">

    <div class="hero-text">
      <h1>LIRA NOX</h1>

      <p class="lead">
        A digital fashion model<br>
        crafted for visual impact.
      </p>

      <p class="values">
        Luxury aesthetics.<br>
        Editorial presence.<br>
        Controlled desire.
      </p>
    </div>

    <div class="hero-image">
      <img src="images/hero.jpg" alt="Lira Nox">
    </div>

  </div>
</section>

<section class="action">
  <div class="action-inner">

    <a href="https://instagram.com/nox.lira" target="_blank" class="action-item">
      <span>Follow the narrative</span>
      <strong>Instagram</strong>
    </a>

    <a href="https://t.me/DEINCHANNEL" target="_blank" class="action-item">
      <span>Not everything is public</span>
      <strong>Telegram</strong>
    </a>

    <a href="https://fanvue.com/nox.lira" target="_blank" class="action-item highlight">
      <span>Enter the private</span>
      <strong>Fanvue</strong>
    </a>

  </div>
</section>

<section class="collab">
  <div class="collab-inner">

    <div class="collab-lines"></div>

    <p class="collab-text">
      FOR CURATED COLLABORATIONS
    </p>

    <a href="mailto:lira.nox@outlook.com" class="collab-mail">
      lira.nox@outlook.com
    </a>

  </div>
</section>

</body>
</html>
